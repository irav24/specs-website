<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electra Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2"></script>

</head>
<body>

    <div id="chat-launcher" onclick="toggleChat()">
        <i class="ph-fill ph-lightning"></i>
    </div>

    <div id="chat-container" class="chat-hidden">
        <div id="chat-header">
            <div class="header-content">
                <span class="logo">ELECTRA <span class="accent-text">SOCIETY</span></span>
            </div>
            <button onclick="toggleChat()" class="minimize-btn">
                <i class="ph ph-caret-double-down"></i>
            </button>
        </div>

        <div id="chat-box">
            <div class="msg bot">
                How can I assist you with Electra Society resources or department information today?
            </div>
        </div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="Enter your query..." autocomplete="off">
            <button id="send-btn" onclick="handleChat()">
                <i class="ph-bold ph-arrow-up"></i>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
